name: xpulse
description: "XPulse — synchronized biometrics, collective progression."
publish_to: 'none'

version: 0.1.0+14

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  health: ^12.0.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/characters/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-400.ttf
          weight: 400
        - asset: assets/fonts/Manrope-500.ttf
          weight: 500
        - asset: assets/fonts/Manrope-600.ttf
          weight: 600
        - asset: assets/fonts/Manrope-700.ttf
          weight: 700
        - asset: assets/fonts/Manrope-800.ttf
          weight: 800
